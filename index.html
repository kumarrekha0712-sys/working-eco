
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase E-Commerce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <h2>🛒 ShopEase</h2>

  <div class="links">
    <a href="#home">Home</a>
    <a href="#products">Products</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section id="home" class="page">
  <h1>Welcome to ShopEase</h1>
  <p>Modern E-Commerce Product Catalog</p>
</section>

<section id="products" class="page hidden">
  <h1>Products</h1>

  <input type="text" id="searchInput" placeholder="Search products...">

  <div id="productGrid" class="grid"></div>
</section>

<section id="about" class="page hidden">
  <h1>About</h1>
  <p>
    This project demonstrates:
  </p>

  <ul>
    <li>REST API Integration</li>
    <li>Client-side Routing</li>
    <li>Dynamic Product Rendering</li>
    <li>Responsive Design</li>
  </ul>
</section>

<section id="contact" class="page hidden">
  <h1>Contact</h1>

  <form class="contact-form">
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
